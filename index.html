<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>My Classroom VR - A-Frame Model</title>
  <!-- 和老师参考文件一致：用 A-Frame 做网页 VR 场景 -->
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<a-scene
  background="color: #dfe8ee"
  renderer="antialias: true; colorManagement: true"
  vr-mode-ui="enabled: true"
  device-orientation-permission-ui="enabled: true">

  <!-- ASSETS：复用老师参考包里的模型与贴图 -->
<a-assets>

    <a-asset-item id="chairModel" src="./assets/chair.glb"></a-asset-item>

    <video
        id="lessonVideo"
        src="./assets/video.mp4"
        preload="auto"
        crossorigin="anonymous">
    </video>

</a-assets>

  <!-- LIGHTS -->
  <a-ambient-light intensity="0.45"></a-ambient-light>
  <a-directional-light position="-5 8 6" intensity="0.9" color="#ffffff"></a-directional-light>
  <a-directional-light position="5 6 -4" intensity="0.45" color="#ffffff"></a-directional-light>

  <!-- CAMERA / VR RIG -->
  <!-- 修正：初始视角放进教室内部，之前 10.5 在后墙外，所以只看见一面白墙 -->
  <a-entity id="rig" position="0 1.6 8.2">
    <a-camera look-controls wasd-controls="enabled: true; acceleration: 22">
      <!-- =========================
第一视角单手（肉色球 + 黑色棍）
========================= -->

<a-entity position="0.22 -0.35 -0.65">

  <!-- 肉色手掌（立体球体） -->
  <a-sphere
    radius="0.14"
    color="#f2c9a0"
    segments-height="32"
    segments-width="32">
  </a-sphere>

  <!-- 黑色手柄（穿过球体） -->
  <a-cylinder
    position="0 0 -0.35"
    radius="0.03"
    height="0.95"
    color="#000000"
    rotation="90 0 0">
  </a-cylinder>

  <!-- 握把加粗部分 -->
  <a-cylinder
    position="0 0 -0.78"
    radius="0.05"
    height="0.22"
    color="#111111"
    rotation="90 0 0">
  </a-cylinder>

</a-entity>
      <a-cursor
        fuse="true"
        fuse-timeout="1800"
        geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.026"
        material="color: white; shader: flat">
      </a-cursor>
    </a-camera>
  </a-entity>

  <!-- 主要教室模型由 script.js 生成 -->
  <a-entity id="classroomRoot"></a-entity>
</a-scene>

<script src="script.js"></script>
</body>
</html>
